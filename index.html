<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07070e">
<title>BRIAM Y | الذكاء العصبي المتقدم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070e;--bg2:#0d0d1a;--bg3:#141428;--bg4:#1a1a32;
  --v:#7c3aed;--vl:#a78bfa;--vd:rgba(124,58,237,.16);
  --gold:#e8a926;--goldl:#fbbf24;
  --t1:#eeeeff;--t2:#b0b0d0;--t3:#6868a0;
  --bdr:rgba(124,58,237,.13);--bdr2:rgba(124,58,237,.34);
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --r:18px;--rsm:12px;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t1);display:flex;}

#bgc{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;}
/* ... بقية التنسيق السابق ... */
/* المغزى هنا: بقية الـ CSS كما هي لضمان الحفاظ على هوية وتصميم المشروع */
/* ===== LOGIN OVERLAY ===== */
.login-overlay{
  position:fixed; inset:0; background:rgba(42,21,65,0.98); z-index:200;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .4s var(--ease); opacity:1;
}
.login-modal{
  background:var(--bg4); border:2px solid var(--v); box-shadow:0 0 40px #7c3aed42;
  border-radius:30px; padding:42px 34px 30px; max-width:340px; width:92%; text-align:center;
  animation:mIn .4s var(--ease);
}
.login-logo{
  font-size:36px; margin-bottom:14px; border-radius:16px;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);width:66px;height:66px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 13px;box-shadow:0 0 16px #c4b5fd27;
}
.login-title{
  font-size:25px;font-weight:900;letter-spacing:-1px;margin-bottom:13px;
  background:linear-gradient(135deg,#c4b5fd,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.login-desc{
  font-size:15px;color:var(--t2);margin-bottom:21px;line-height:1.7;}
.login-inp{
  width:100%;padding:13px 12px;font-size:15px;text-align:center;border-radius:11px;margin-bottom:17px;outline:none;
  border:2px solid var(--bdr2);background:var(--bg2);color:var(--t1);transition:.2s;
}
.login-inp:focus{border-color:var(--v);}
.login-btn{
  width:100%;padding:11px;font-size:17px;font-weight:700;border-radius:13px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;box-shadow:0 6px 24px #7c3aed29;transition:.2s;
}
.login-btn:active{transform:scale(.96);}
.login-err{color:var(--red);font-size:13px;margin-bottom:9px;display:none;}
@media(max-width:460px){.login-modal{padding:28px 5vw 20px;}}
</style>
</head>
<body>
<canvas id="bgc"></canvas>

<!-- نافذة تسجيل دخول api key -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-modal">
    <div class="login-logo">🔑</div>
    <div class="login-title">تسجيل الدخول</div>
    <div class="login-desc">الرجاء إدخال مفتاح <span style="color:var(--vl);font-weight: bold;">API</span> الخاص بك لتفعيل الذكاء ��لعصبي.</div>
    <input type="password" class="login-inp" placeholder="ادخل مفتاح API هنا..." id="apiKeyInput" autocomplete="off">
    <div class="login-err" id="loginErr">المفتاح غير صحيح أو مفقود.</div>
    <button class="login-btn" onclick="tryLogin()">دخول</button>
  </div>
</div>

<!-- ... بقية الصفحة الأصلية (sidebar + main + السكريبتات) بدون أي تغيير إلا في الكود أدناه ... -->
<div class="sidebar" id="sidebar">
  <!-- ... (نفس كود sidebar) ... -->
</div>
<div class="main">
  <!-- ... (نفس كود main/chat/inputs) ... -->
</div>
<script>
// ===== STARFIELD =====
// ... (نفس الكود السابق) ...

// ============= API KEY LOGIN LOGIC =============
function getUserApiKey(){
  return localStorage.getItem('briam_user_api_key')||'';
}
function saveUserApiKey(key){
  localStorage.setItem('briam_user_api_key',key); 
}
let API_KEY = getUserApiKey();
const overlay = document.getElementById('loginOverlay');
const apiKeyInput = document.getElementById('apiKeyInput');
const loginErr = document.getElementById('loginErr');

if (!API_KEY) {
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
} else {
  overlay.style.display = 'none';
  document.body.style.overflow = '';
}
function tryLogin() {
  let key = apiKeyInput.value.trim();
  if (!key || key.length < 16) {
    loginErr.style.display = 'block';
    loginErr.textContent = 'يرجى إدخال مفتاح صحيح';
    return;
  }
  API_KEY = key;
  saveUserApiKey(key);
  overlay.style.display = 'none';
  document.body.style.overflow = '';
  loginErr.style.display = 'none';
}
// إذا ضغط دخول مع Enter
apiKeyInput.addEventListener('keydown',function(e){if(e.key==='Enter'){tryLogin();}});

// ============= باقي الأكواد الأصلية كما هي ============= //
// - أزل const API_KEY = '...'; من الكود الأصلي (سيتم استبداله بالكود الأعلى)
// - استخدم المتغير API_KEY مباشرة في أماكن استدعاء الـ fetch
// ...
</script>
</body>
</html>
