<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050510">
    <title>BRIAM Y | الذكاء العصبي المتقدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050510;
            --bg-secondary: #0a0a20;
            --bg-tertiary: #121235;
            --text-primary: #f0f0ff;
            --text-secondary: #c8c8ee;
            --text-muted: #8888b8;
            --accent: #7c3aed;
            --accent-glow: #a78bfa;
            --border: rgba(124, 58, 237, 0.15);
            --glass: rgba(15, 15, 40, 0.75);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            -webkit-tap-highlight-color: transparent;
        }

        /* Background */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 16, 0.98);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s var(--transition);
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-container {
            width: 95%;
            max-width: 420px;
        }

        .login-modal {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.9), rgba(26, 26, 50, 0.7));
            border: 2px solid var(--accent);
            border-radius: 24px;
            padding: 40px 28px;
            box-shadow: 0 0 80px rgba(124, 58, 237, 0.35);
            backdrop-filter: blur(15px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo {
            font-size: 48px;
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            border-radius: 20px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.5);
        }

        .login-title {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #c4b5fd, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-glow);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-inp {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: rgba(13, 13, 26, 0.7);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            transition: var(--transition);
        }

        .login-inp:focus {
            border-color: var(--accent);
            background: rgba(13, 13, 26, 0.95);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white;
            box-shadow: 0 8px 28px rgba(124, 58, 237, 0.4);
            transition: var(--transition);
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.55);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-err {
            color: #ef4444;
            font-size: 12px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .login-err.show {
            display: block;
        }

        /* Main UI */
        .main-ui {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            z-index: 10;
        }

        .main-ui.active {
            display: flex;
        }

        /* Conversations Sidebar */
        .conversations-sidebar {
            position: fixed;
            right: -320px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            z-index: 30;
            transition: right 0.3s var(--transition);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .conversations-sidebar.open {
            right: 0;
        }

        .conv-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conv-title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .conv-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: var(--transition);
        }

        .conv-close-btn:hover {
            color: white;
            background: var(--bg-tertiary);
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conv-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 6px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 12px;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conv-item:hover {
            background: var(--bg-tertiary);
            color: white;
        }

        .conv-item.active {
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid var(--accent);
            color: white;
        }

        .conv-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            opacity: 0;
            transition: var(--transition);
        }

        .conv-item:hover .conv-delete {
            opacity: 1;
        }

        .conv-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .new-chat-btn {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        /* Header */
        .header {
            padding: 12px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 20;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .menu-toggle:hover {
            background: var(--bg-tertiary);
            color: white;
        }

        .header-title {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: msgSlide 0.3s ease;
        }

        @keyframes msgSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-role {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .msg-text {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            line-height: 1.6;
            font-size: 14px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg-user .msg-text {
            background: rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.4);
        }

        .msg-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: var(--transition);
        }

        .action-btn:hover {
            color: white;
            background: var(--bg-tertiary);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input Area */
        .input-container {
            padding: 12px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 20;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            font-size: 14px;
            max-height: 100px;
            min-height: 40px;
            transition: var(--transition);
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.6);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.4);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 58, 237, 0.6);
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .header-title { font-size: 14px; }
            .msg-text { font-size: 13px; padding: 10px 12px; }
            .login-modal { padding: 32px 20px; }
            .login-title { font-size: 24px; }
            textarea { font-size: 13px; }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="stars-bg" id="starsBg"></div>

    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-container">
            <div class="login-modal">
                <div class="login-header">
                    <div class="login-logo">🔐</div>
                    <div class="login-title">BRIAM Y</div>
                    <div class="login-desc">الذكاء العصبي المتقدم</div>
                </div>
                <div class="login-form">
                    <div class="input-group">
                        <label class="input-label">مفتاح API</label>
                        <input type="password" class="login-inp" placeholder="sk-ant-..." id="apiKeyInput" autocomplete="off">
                    </div>
                    <div class="login-err" id="loginErr"></div>
                    <button class="login-btn" id="loginBtn" onclick="tryLogin()">🚀 تفعيل</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main UI -->
    <div class="main-ui" id="mainUI">
        <!-- Header -->
        <div class="header">
            <button class="menu-toggle" onclick="toggleConversations()">☰</button>
            <span class="header-title">🧬 BRIAM Y – النواة العصبية</span>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer"></div>

        <!-- Input Container -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="اسأل BRIAM Y..." rows="1" onkeydown="handleKeydown(event)"></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Conversations Sidebar -->
    <div class="conversations-sidebar" id="conversationsSidebar">
        <div class="conv-header">
            <span class="conv-title">محادثاتي</span>
            <button class="conv-close-btn" onclick="toggleConversations()">✕</button>
        </div>
        <div class="conv-list" id="convList"></div>
        <div class="conv-footer">
            <button class="new-chat-btn" onclick="newChat()">✨ جديدة</button>
        </div>
    </div>

    <script>
        // ===== Variables =====
        let API_KEY = '';
        let conversations = [];
        let currentConvId = null;
        const CONVERSATIONS_STORAGE = 'briam_conversations';
        const API_KEY_STORAGE = 'briam_api_key';

        // ===== Initialize =====
        window.addEventListener('DOMContentLoaded', () => {
            createStars();
            API_KEY = localStorage.getItem(API_KEY_STORAGE) || '';
            loadConversations();
            
            if (API_KEY && validateApiKey(API_KEY)) {
                unlockApp();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
                setTimeout(() => document.getElementById('apiKeyInput').focus(), 300);
            }
        });

        // ===== Star Animation =====
        function createStars() {
            const bg = document.getElementById('starsBg');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                star.style.animationDelay = Math.random() * 2 + 's';
                bg.appendChild(star);
            }
        }

        // ===== API Key Management =====
        function validateApiKey(key) {
            return key && key.startsWith('sk-ant-') && key.length >= 20;
        }

        function tryLogin() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const err = document.getElementById('loginErr');
            err.classList.remove('show');

            if (!key) {
                showError('أدخل مفتاح API', err);
                return;
            }

            if (!key.startsWith('sk-ant-')) {
                showError('❌ المفتاح يجب أن يبدأ بـ sk-ant-', err);
                return;
            }

            if (key.length < 20) {
                showError('❌ المفتاح قصير جداً', err);
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '⏳ جاري...';

            setTimeout(() => {
                API_KEY = key;
                localStorage.setItem(API_KEY_STORAGE, key);
                btn.disabled = false;
                btn.textContent = '🚀 تفعيل';
                unlockApp();
            }, 600);
        }

        function showError(msg, elem) {
            elem.textContent = msg;
            elem.classList.add('show');
        }

        function unlockApp() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainUI').classList.add('active');
            document.getElementById('apiKeyInput').value = '';
            newChat();
        }

        // ===== Conversations Management =====
        function loadConversations() {
            const saved = localStorage.getItem(CONVERSATIONS_STORAGE);
            conversations = saved ? JSON.parse(saved) : [];
            renderConversationList();
        }

        function saveConversations() {
            localStorage.setItem(CONVERSATIONS_STORAGE, JSON.stringify(conversations));
            renderConversationList();
        }

        function newChat() {
            currentConvId = 'conv_' + Date.now();
            conversations.unshift({
                id: currentConvId,
                title: 'محادثة جديدة',
                messages: [],
                createdAt: new Date().toLocaleString('ar')
            });
            document.getElementById('chatContainer').innerHTML = '';
            saveConversations();
            toggleConversations();
            document.getElementById('userInput').focus();
        }

        function renderConversationList() {
            const list = document.getElementById('convList');
            list.innerHTML = '';
            conversations.forEach(conv => {
                const item = document.createElement('div');
                item.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
                item.innerHTML = `
                    <span onclick="loadConversation('${conv.id}')">${conv.title.substring(0, 20)}...</span>
                    <button class="conv-delete" onclick="deleteConversation('${conv.id}')">✕</button>
                `;
                list.appendChild(item);
            });
        }

        function loadConversation(convId) {
            const conv = conversations.find(c => c.id === convId);
            if (!conv) return;
            currentConvId = convId;
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            conv.messages.forEach(msg => addMessageToUI(msg.role, msg.content, false));
            renderConversationList();
            toggleConversations();
            container.scrollTop = container.scrollHeight;
        }

        function deleteConversation(convId) {
            if (confirm('حذف هذه المحادثة؟')) {
                conversations = conversations.filter(c => c.id !== convId);
                if (currentConvId === convId) newChat();
                else saveConversations();
            }
        }

        function toggleConversations() {
            document.getElementById('conversationsSidebar').classList.toggle('open');
        }

        // ===== Chat Functions =====
        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMessageToUI('user', msg);
            input.value = '';
            input.style.height = 'auto';

            const typingId = addTypingIndicator();

            try {
                const response = await fetch('/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        message: msg,
                        user_id: 'mobile_user',
                        context: { timestamp: new Date().toISOString() }
                    })
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                if (data.response) {
                    addMessageToUI('assistant', data.response);
                } else if (data.error) {
                    addMessageToUI('assistant', `⚠️ خطأ: ${data.error}`);
                }
            } catch (err) {
                document.getElementById(typingId)?.remove();
                addMessageToUI('assistant', '⚠️ فشل الاتصال بالخادم. تأكد من البيانات.');
            }
        }

        function addMessageToUI(role, text, save = true) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message msg-' + role;

            const avatar = role === 'user' ? '👤' : '🧬';
            const avatarBg = role === 'user' ? 'linear-gradient(135deg, #3b82f6, #2563eb)' : 'linear-gradient(135deg, #7c3aed, #a78bfa)';
            const roleName = role === 'user' ? 'أنت' : 'BRIAM Y';

            div.innerHTML = `
                <div class="msg-avatar" style="background:${avatarBg};">${avatar}</div>
                <div class="msg-content">
                    <div class="msg-role">${roleName}</div>
                    <div class="msg-text">${formatText(text)}</div>
                    <div class="msg-actions">
                        <button class="action-btn" onclick="copyMsg(this)">📋 نسخ</button>
                    </div>
                </div>
            `;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            if (save) {
                const conv = conversations.find(c => c.id === currentConvId);
                if (conv) {
                    conv.messages.push({ role, content: text });
                    if (conv.messages.length === 1) {
                        conv.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                    }
                    saveConversations();
                }
            }
        }

        function addTypingIndicator() {
            const container = document.getElementById('chatContainer');
            const id = 'typing_' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message';
            div.innerHTML = `
                <div class="msg-avatar" style="background:linear-gradient(135deg, #7c3aed, #a78bfa);">🧬</div>
                <div class="msg-content">
                    <div class="msg-role">BRIAM Y يفكر...</div>
                    <div class="msg-text" style="padding: 8px 0;">
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        function copyMsg(btn) {
            const text = btn.closest('.msg-content').querySelector('.msg-text').innerText;
            navigator.clipboard.writeText(text);
            const orig = btn.textContent;
            btn.textContent = '✅ تم';
            setTimeout(() => btn.textContent = orig, 1500);
        }

        // Auto-resize textarea
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('userInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        });

        // Handle logout
        window.addEventListener('beforeunload', () => {
            if (!API_KEY) {
                localStorage.removeItem(API_KEY_STORAGE);
            }
        });
    </script>
</body>
</html>
